services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: page_builder
      POSTGRES_USER: page_builder
      POSTGRES_PASSWORD: page_builder
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: oven/bun:1.3
    working_dir: /app
    # The base oven/bun image is slim and has no ssh/git client. We need both
    # so `bun install` can clone the private pixel-art-icons repo via SSH.
    # apt-get cache survives container restarts (only re-runs on recreation).
    command: sh -lc "(command -v ssh >/dev/null && command -v git >/dev/null) || (apt-get update && apt-get install -y --no-install-recommends openssh-client git ca-certificates) && bun install --frozen-lockfile && bun run build && bun run server/index.ts"
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://page_builder:page_builder@postgres:5432/page_builder
      SESSION_SECRET: change-me
      UPLOADS_DIR: /app/uploads
      STATIC_DIR: /app/dist
      # Override SSH for git operations: ignore the host's ~/.ssh/config (it
      # contains macOS-only options like UseKeychain) and point at the
      # mounted key + known_hosts directly. This lets `bun install` clone
      # the private pixel-art-icons repo from inside the container.
      GIT_SSH_COMMAND: "ssh -F /dev/null -o IdentityFile=/root/.ssh/id_ed25519 -o UserKnownHostsFile=/root/.ssh/known_hosts -o StrictHostKeyChecking=accept-new"
    volumes:
      - .:/app
      # Mount the host's SSH directory read-only so `bun install` inside the
      # container can clone pixel-art-icons via the git+ssh URL using the
      # developer's existing SSH key + known_hosts. The container runs as
      # root, so target /root/.ssh.
      - ${HOME}/.ssh:/root/.ssh:ro
      - uploads:/app/uploads
    depends_on:
      - postgres

volumes:
  postgres_data:
  uploads:
