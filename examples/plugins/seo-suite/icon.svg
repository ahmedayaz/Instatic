<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Pixel-art magnifying glass with an upward-trend line inside -->
  <!-- Lens circle (3x3 pixel-art blocks) -->
  <rect x="3" y="3" width="2" height="2" fill="currentColor"/>
  <rect x="5" y="2" width="4" height="2" fill="currentColor"/>
  <rect x="9" y="3" width="2" height="2" fill="currentColor"/>
  <rect x="2" y="5" width="2" height="4" fill="currentColor"/>
  <rect x="10" y="5" width="2" height="4" fill="currentColor"/>
  <rect x="3" y="9" width="2" height="2" fill="currentColor"/>
  <rect x="9" y="9" width="2" height="2" fill="currentColor"/>
  <rect x="5" y="10" width="4" height="2" fill="currentColor"/>
  <!-- Trend line inside lens -->
  <rect x="4" y="7" width="2" height="2" fill="currentColor"/>
  <rect x="6" y="5" width="2" height="2" fill="currentColor"/>
  <rect x="8" y="6" width="2" height="2" fill="currentColor"/>
  <!-- Handle -->
  <rect x="10" y="10" width="2" height="2" fill="currentColor"/>
  <rect x="12" y="12" width="2" height="2" fill="currentColor"/>
  <rect x="14" y="14" width="2" height="2" fill="currentColor"/>
  <rect x="16" y="16" width="2" height="2" fill="currentColor"/>
  <rect x="18" y="18" width="2" height="2" fill="currentColor"/>
</svg>
